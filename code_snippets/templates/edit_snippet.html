{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2>Edit: {{ snippet.title }}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-success">Save Changes</button>
        <a href="{% url 'my_snippets' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
